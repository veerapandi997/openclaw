# render.yaml - OpenClaw with OpenRouter (FIXED BUILD PATH)
# This version fixes the package.json path issue

services:
  - type: web
    name: openclaw
    runtime: docker
    region: oregon
    plan: free
    
    healthCheckPath: /health
    healthCheckInterval: 30
    
    # FIXED: Changed build command to work with actual package.json location
    buildCommand: cd /opt/render/project && npm install
    startCommand: npm run start
    
    envVars:
      # ===== RENDER REQUIREMENTS =====
      - key: PORT
        value: "10000"
      
      - key: NODE_ENV
        value: "production"
      
      # ===== OPENCLAW CORE SETTINGS =====
      - key: OPENCLAW_GATEWAY_PORT
        value: "10000"
      
      - key: OPENCLAW_STATE_DIR
        value: /tmp/.openclaw
      
      - key: OPENCLAW_WORKSPACE_DIR
        value: /tmp/workspace
      
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
      
      # ===== OPENROUTER CONFIGURATION =====
      - key: OPENCLAW_LLM_PROVIDER
        value: "openrouter"
      
      - key: OPENROUTER_API_KEY
        sync: false
      
      - key: OPENCLAW_MODEL
        value: "openrouter/anthropic/claude-sonnet-4-5"
      
      - key: OPENCLAW_MODEL_FALLBACK_1
        value: "openrouter/google/gemini-2-5-flash"
      
      - key: OPENCLAW_MODEL_FALLBACK_2
        value: "openrouter/meta-llama/llama-3-1-70b-instruct"
      
      # ===== OPTIONAL SETTINGS =====
      - key: OPENCLAW_DISABLE_SKILLS
        value: "gmail,google_calendar,slack"
      
      - key: LOG_LEVEL
        value: "info"
      
      - key: DEBUG
        value: "openclaw:*"

# ===== WHAT WAS FIXED =====
#
# ERROR: npm error path /opt/render/project/src/package.json
# This means:
#  - Render clones repo to /opt/render/project/
#  - package.json is in the root, not in /src/
#  - The buildCommand needed to cd to the right directory
#
# SOLUTION: Added "cd /opt/render/project &&" before npm install
# This ensures we run npm from the correct directory

# ===== IF THIS STILL FAILS =====
#
# Option 1: Check actual package.json location
#   - Go to your fork: https://github.com/veerapandi997/openclaw
#   - Look for package.json file
#   - Note its location (root? src? somewhere else?)
#
# Option 2: Try docker buildCommand alternative
#   buildCommand: npm install --prefix /opt/render/project
#
# Option 3: Use proper root directory
#   If package.json is at: /opt/render/project/package.json
#   Then buildCommand: npm install
#   (default should work)

# ===== SETUP INSTRUCTIONS =====
#
# 1. Update your fork with this render.yaml
# 2. In Render Environment, add:
#    OPENROUTER_API_KEY = sk-or-v1-xxxxx (as SECRET)
# 3. Redeploy
# 4. Check logs for "npm install successful"
#
# If still failing:
# Check: https://github.com/veerapandi997/openclaw/blob/main/package.json
# Does package.json exist in the root?
