#   openrouter/mistralai/mistral-medium           (Good balance)
#   openrouter/mistralai/mistral-small            (Fast, cheap)
#
# Special:
#   openrouter/auto                               (Auto-routes based on task)
#
# ===== PRICING COMPARISON (approximate) =====
#
# Model                        Input Cost    Speed    Best For
# -------------------------------------------------------------------
# Gemini 2.5 Flash            $0.50/M       Fast     Quick tasks, summaries
# Claude Haiku 3.5            $0.80/M       Fast     Small tasks
# Mistral Small               $0.15/M       Fast     Very cheap tasks
# Claude Sonnet 4.5           $3/M          Medium   General purpose ✓ RECOMMENDED
# Gemini 2.5 Pro              $1.25/M       Medium   Good balance
# GPT-4o                      $5/M          Medium   Strong reasoning
# Claude Opus 4.6             $15/M         Slow     Most capable
# GPT-4 Turbo                 $10/M         Medium   Complex tasks
#
# ===== COST OPTIMIZATION STRATEGY =====
#
# Recommended setup:
# Primary: openrouter/anthropic/claude-sonnet-4-5
# Fallback 1: openrouter/google/gemini-2-5-flash (if Claude fails)
# Fallback 2: openrouter/meta-llama/llama-3-1-70b (if Google fails)
#
# This gives you:
# ✓ Best-in-class capability as default
# ✓ Fast fallback for resilience
# ✓ Open-source option as last resort
# ✓ Cost optimization across models
#
# ===== MONITORING & DEBUGGING =====
#
# Check your usage:
# 1. Go to https://openrouter.ai/activity
# 2. View request logs and costs
# 3. See which models were used
# 4. Monitor API key balance
#
# Troubleshooting:
# 1. Check Render logs for errors:
#    Render Dashboard → Logs tab
# 2. Verify API key is correct:
#    Render Dashboard → Environment tab
# 3. Test OpenRouter connectivity:
#    curl -H "Authorization: Bearer sk-or-v1-xxxxx" \
#      https://openrouter.ai/api/v1/models
# 4. Check OpenRouter status:
#    https://openrouter.ai/status
#
# ===== COMMON ISSUES & SOLUTIONS =====
#
# Issue: "No API key found for provider openrouter"
# Solution:
#   a. Check Render Environment tab
#   b. Verify key format: sk-or-v1-xxxxx
#   c. Key must be added as SECRET (not sync)
#   d. Redeploy after adding key
#
# Issue: "OpenRouter API rate limit exceeded"
# Solution:
#   a. Switch to cheaper fallback model
#   b. Add more credits at openrouter.ai
#   c. Wait a few minutes and retry
#
# Issue: "Model not found: openrouter/xxx"
# Solution:
#   a. Check available models: https://openrouter.ai/docs/models
#   b. Use correct format: openrouter/author/model-name
#   c. Some models may be deprecated, check for replacements
#
# Issue: Agent responds slowly
# Solution:
#   a. Switch to faster model: gemini-2-5-flash or haiku
#   b. Check OpenRouter status page
#   c. Consider dedicated VPS for better latency

